<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Ondas SSC7 - ML Style</title>
    <!-- Bibliotecas via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #EBEBEB; /* Cinzento Mercado Livre */
            color: #333;
        }
        .ml-card {
            background-color: #FFFFFF;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,.1);
        }
        .bg-ml-yellow { background-color: #FFE600; }
        .bg-ml-blue { background-color: #3483FA; }
        .text-ml-blue { color: #3483FA; }
        
        @keyframes pulse-red {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.8; }
        }
        .animate-alert { animation: pulse-red 1s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const Icons = {
            Play: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            Pause: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            RotateCcw: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            Package: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16.5 9.4 7.5 4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
            Volume2: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
            VolumeX: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>,
            Clock: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Bullhorn: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2V15H6L11 19V5Z"/><path d="M19.07 4.93C20.94 6.81 22 9.33 22 12C22 14.67 20.94 17.19 19.07 19.07"/><path d="M15.54 8.46C16.47 9.4 17 10.66 17 12C17 13.34 16.47 14.6 15.54 15.54"/></svg>,
        };

        const App = () => {
            const [view, setView] = useState('timer');
            const [waves, setWaves] = useState(() => {
                const saved = localStorage.getItem('ssc7_waves_config_v6');
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: 'Onda 1', duration: 30 * 60, startTime: '12:30' },
                    { id: 2, name: 'Onda 2', duration: 20 * 60, startTime: '13:00' },
                    { id: 3, name: 'Onda 3', duration: 20 * 60, startTime: '13:20' },
                    { id: 4, name: 'Onda 4', duration: 20 * 60, startTime: '13:40' },
                    { id: 5, name: 'Onda 5', duration: 20 * 60, startTime: '14:00' },
                    { id: 6, name: 'Onda 6', duration: 20 * 60, startTime: '14:20' },
                    { id: 7, name: 'Onda 7', duration: 5 * 60, startTime: '14:40' },
                ];
            });

            const [activeWaveIndex, setActiveWaveIndex] = useState(0);
            const [timeLeft, setTimeLeft] = useState(waves[0].duration);
            const [isRunning, setIsRunning] = useState(false);
            const [isMuted, setIsMuted] = useState(false);
            const [isAutoStartEnabled, setIsAutoStartEnabled] = useState(false);
            const [alarmTriggerMinutes, setAlarmTriggerMinutes] = useState(1);
            const [alarmRepeatSeconds, setAlarmRepeatSeconds] = useState(45);
            const [systemTime, setSystemTime] = useState("");
            
            // --- Estados para Voz ---
            const [voices, setVoices] = useState([]);
            const [selectedVoiceName, setSelectedVoiceName] = useState(() => localStorage.getItem('ssc7_selected_voice') || "");

            const timerRef = useRef(null);

            // Carregamento de Vozes com Pré-Seleção do Google Brasil
            useEffect(() => {
                const loadVoices = () => {
                    const availableVoices = window.speechSynthesis.getVoices();
                    setVoices(availableVoices);
                    
                    // Lógica de Pré-Seleção:
                    // 1. Tenta recuperar do localStorage (preferência do utilizador)
                    // 2. Se não houver, procura especificamente por "Google português do Brasil"
                    // 3. Se não encontrar, procura qualquer uma que contenha "pt-BR"
                    // 4. Se ainda assim nada, usa a primeira disponível
                    if (!localStorage.getItem('ssc7_selected_voice') && availableVoices.length > 0) {
                        const googleBrasil = availableVoices.find(v => v.name === "Google português do Brasil");
                        const anyBrasil = availableVoices.find(v => v.lang.includes('pt-BR'));
                        
                        if (googleBrasil) {
                            setSelectedVoiceName(googleBrasil.name);
                        } else if (anyBrasil) {
                            setSelectedVoiceName(anyBrasil.name);
                        } else {
                            setSelectedVoiceName(availableVoices[0].name);
                        }
                    }
                };

                loadVoices();
                if (window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            useEffect(() => {
                if (selectedVoiceName) {
                    localStorage.setItem('ssc7_selected_voice', selectedVoiceName);
                }
            }, [selectedVoiceName]);

            const addMinutesToTime = (timeStr, mins) => {
                const [hours, minutes] = timeStr.split(':').map(Number);
                const date = new Date();
                date.setHours(hours, minutes + Math.floor(mins), (mins % 1) * 60);
                return date.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
            };

            useEffect(() => {
                const updatedWaves = [...waves];
                let changed = false;

                for (let i = 1; i < updatedWaves.length; i++) {
                    const prevWave = updatedWaves[i - 1];
                    const durationInMinutes = prevWave.duration / 60;
                    const nextStartTime = addMinutesToTime(prevWave.startTime, durationInMinutes);
                    
                    if (updatedWaves[i].startTime !== nextStartTime) {
                        updatedWaves[i].startTime = nextStartTime;
                        changed = true;
                    }
                }

                if (changed) {
                    setWaves(updatedWaves);
                }
            }, [waves[0].startTime, waves.map(w => w.duration).join(',')]);

            useEffect(() => {
                localStorage.setItem('ssc7_waves_config_v6', JSON.stringify(waves));
            }, [waves]);

            const playHorn = useCallback(() => {
                if (isMuted) return;
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                const playTone = (freq, startTime, duration) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, startTime);
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.1, startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                };

                // Ding-Dong Estilo Aeroporto Lento
                playTone(554.37, audioCtx.currentTime, 0.9);
                playTone(440.00, audioCtx.currentTime + 0.7, 0.9);
                
                setTimeout(() => audioCtx.close(), 3000);
            }, [isMuted]);

            const speak = useCallback((text) => {
                if (isMuted) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                
                const voice = voices.find(v => v.name === selectedVoiceName);
                if (voice) {
                    utterance.voice = voice;
                } else {
                    utterance.lang = 'pt-BR';
                }
                
                window.speechSynthesis.speak(utterance);
            }, [isMuted, voices, selectedVoiceName]);

            const triggerManualAlert = () => {
                const minsRestantes = Math.floor(timeLeft / 60);
                const nomeOnda = waves[activeWaveIndex].name;
                playHorn();
                setTimeout(() => {
                    speak(`Atenção equipe, para a ${nomeOnda} restam ${minsRestantes} minutos.`);
                }, 1600);
            };

            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    const currentTimeStr = now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
                    setSystemTime(currentTimeStr);

                    if (isAutoStartEnabled && !isRunning && activeWaveIndex === 0 && timeLeft === waves[0].duration) {
                        if (currentTimeStr === waves[0].startTime) {
                            toggleTimer(true);
                        }
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [isAutoStartEnabled, isRunning, activeWaveIndex, timeLeft, waves[0].startTime]);

            useEffect(() => {
                if (isRunning && timeLeft > 0) {
                    timerRef.current = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft === 0 && isRunning) {
                    setIsRunning(false);
                    playHorn();
                    speak(`${waves[activeWaveIndex].name} finalizada.`);
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [isRunning, timeLeft, activeWaveIndex]);

            useEffect(() => {
                if (!isRunning) return;
                const totalDuration = waves[activeWaveIndex].duration;
                const halfTime = Math.floor(totalDuration / 2);

                if (timeLeft === halfTime) {
                    const minsRestantes = Math.floor(timeLeft / 60);
                    const nomeOnda = waves[activeWaveIndex].name;
                    playHorn();
                    setTimeout(() => {
                        speak(`${nomeOnda} já se passou metade do tempo, restam ${minsRestantes} minutos.`);
                    }, 1600);
                }

                const triggerSecs = alarmTriggerMinutes * 60;
                if (timeLeft <= triggerSecs && timeLeft > 0 && timeLeft % alarmRepeatSeconds === 0 && timeLeft !== halfTime) {
                    playHorn();
                    setTimeout(() => {
                        speak(`Atenção, faltam ${Math.floor(timeLeft / 60)} minutos para o fim da onda.`);
                    }, 1600);
                }
            }, [timeLeft, isRunning]);

            const formatTime = (s) => {
                const mins = Math.floor(s / 60).toString().padStart(2, '0');
                const secs = (s % 60).toString().padStart(2, '0');
                return `${mins}:${secs}`;
            };

            const toggleTimer = (forceStart = false) => {
                const willStart = forceStart || !isRunning;
                if (willStart && timeLeft === waves[activeWaveIndex].duration) {
                    playHorn();
                    setTimeout(() => {
                        speak(`Atenção equipe, vai iniciar a ${waves[activeWaveIndex].name}`);
                    }, 1600);
                }
                setIsRunning(willStart);
            };

            return (
                <div className="p-4 md:p-8 max-w-6xl mx-auto min-h-screen flex flex-col">
                    <header className="flex justify-between items-center mb-6 bg-ml-yellow p-4 rounded-xl ml-card border-b-2 border-yellow-400">
                        <div className="flex items-center gap-3">
                            <div className="bg-white p-2 rounded-lg text-ml-blue shadow-sm"><Icons.Package /></div>
                            <div>
                                <h1 className="font-black text-xl tracking-tight uppercase italic leading-none">Gestor de Ondas SSC7</h1>
                                <p className="text-[10px] font-bold text-slate-600 uppercase tracking-widest mt-1">Lages, SC • Operação ML</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="hidden md:flex items-center gap-2 bg-white/50 px-3 py-1 rounded-lg text-[10px] font-bold text-slate-700">
                                <Icons.Clock /> {systemTime}
                            </div>
                            <button onClick={() => setIsMuted(!isMuted)} className={`p-2 rounded-lg transition-all ${isMuted ? 'bg-red-500 text-white' : 'bg-white/50 text-slate-800'}`}>
                                {isMuted ? <Icons.VolumeX /> : <Icons.Volume2 />}
                            </button>
                            <button onClick={() => setView(view === 'timer' ? 'setup' : 'timer')} className="bg-white/50 hover:bg-white p-2 rounded-lg transition-all text-slate-800">
                                <Icons.Settings />
                            </button>
                        </div>
                    </header>

                    {view === 'timer' ? (
                        <div className="flex-1 flex flex-col gap-6">
                            <div className="ml-card rounded-2xl p-10 md:p-16 text-center border border-slate-200 relative overflow-hidden flex-1 flex flex-col justify-center">
                                <div className="mb-4 flex flex-col items-center gap-2">
                                    <span className={`px-5 py-1.5 rounded-full text-xs font-black uppercase tracking-[0.2em] border ${timeLeft < 60 ? 'bg-red-500 text-white border-red-600' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>
                                        {waves[activeWaveIndex].name} • {isRunning ? 'Em Execução' : 'Pausado'}
                                    </span>
                                    {isAutoStartEnabled && activeWaveIndex === 0 && !isRunning && (
                                        <span className="text-[10px] font-bold text-ml-blue uppercase animate-pulse">
                                            Aguarda Início Auto às {waves[0].startTime}
                                        </span>
                                    )}
                                </div>
                                <div className={`text-9xl md:text-[14rem] font-mono font-black tabular-nums tracking-tighter leading-none my-6 transition-colors duration-500 ${timeLeft < 60 ? 'text-red-500 animate-alert' : 'text-slate-900'}`}>
                                    {formatTime(timeLeft)}
                                </div>
                                <div className="max-w-xl mx-auto w-full h-4 bg-slate-100 rounded-full mb-12 overflow-hidden p-1 border border-slate-200 shadow-inner">
                                    <div className={`h-full rounded-full transition-all duration-1000 ${timeLeft < 60 ? 'bg-red-500' : 'bg-ml-blue'}`} style={{ width: `${(1 - timeLeft / waves[activeWaveIndex].duration) * 100}%` }}></div>
                                </div>
                                <div className="flex flex-wrap justify-center gap-4">
                                    <button onClick={() => {setIsRunning(false); setTimeLeft(waves[activeWaveIndex].duration)}} className="p-5 rounded-xl bg-slate-100 hover:bg-slate-200 transition-all border border-slate-300 active:scale-95"><Icons.RotateCcw /></button>
                                    <button onClick={triggerManualAlert} className="p-5 rounded-xl bg-blue-50 text-ml-blue hover:bg-blue-100 border border-blue-200 active:scale-95 flex items-center gap-2"><Icons.Bullhorn /><span className="hidden md:inline font-bold text-xs uppercase">Alerta Manual</span></button>
                                    <button onClick={() => toggleTimer()} className={`px-16 py-5 rounded-xl font-black text-2xl flex items-center gap-4 shadow-lg transition-all transform active:scale-95 ${isRunning ? 'bg-slate-800 text-white' : 'bg-ml-yellow text-slate-900'}`}>{isRunning ? <><Icons.Pause /> Pausar</> : <><Icons.Play /> Iniciar</>}</button>
                                    {timeLeft === 0 && activeWaveIndex < waves.length - 1 && (
                                        <button onClick={() => { const next = activeWaveIndex + 1; setActiveWaveIndex(next); setTimeLeft(waves[next].duration); speak(`Iniciando a ${waves[next].name}`); }} className="px-10 py-5 rounded-xl bg-ml-blue text-white font-black text-xl hover:brightness-110 shadow-lg animate-bounce">Próxima Onda</button>
                                    )}
                                </div>
                                <div className="absolute -bottom-10 -right-10 opacity-5 rotate-12 pointer-events-none"><Icons.Package size={300} /></div>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
                                {waves.map((w, i) => (
                                    <div key={w.id} className={`p-4 rounded-xl border-2 transition-all cursor-pointer ${i === activeWaveIndex ? 'border-ml-blue bg-white shadow-md scale-105 z-10' : i < activeWaveIndex ? 'border-transparent bg-slate-200 opacity-40 grayscale' : 'border-transparent bg-white/50 opacity-70 hover:opacity-100'}`} onClick={() => { if (!isRunning) { setActiveWaveIndex(i); setTimeLeft(w.duration); } }}>
                                        <p className="text-[10px] font-black uppercase text-slate-400 mb-1">{w.startTime}</p>
                                        <p className="font-bold text-slate-800 text-sm">{w.name}</p>
                                        <p className="text-xs text-ml-blue font-black uppercase tracking-tighter">{Math.floor(w.duration / 60)} MIN</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="ml-card p-8 rounded-2xl border border-slate-200">
                            <div className="flex items-center justify-between mb-8">
                                <h2 className="text-2xl font-black uppercase tracking-tight">Configurações</h2>
                                <button onClick={() => setView('timer')} className="text-slate-500 font-bold hover:text-slate-800 underline">Voltar</button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="space-y-4">
                                    <h3 className="font-black text-slate-400 uppercase text-xs tracking-widest border-b pb-2">Tempos e Horários</h3>
                                    <div className="space-y-3">
                                        {waves.map((w, i) => (
                                            <div key={w.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-200">
                                                <div className="flex flex-col">
                                                    <span className="font-bold text-slate-700 text-sm">{w.name}</span>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <input type="number" value={w.duration/60} onChange={(e) => { const newWaves = [...waves]; const val = Number(e.target.value); newWaves[i].duration = val * 60; setWaves(newWaves); if (i === activeWaveIndex) setTimeLeft(val * 60); }} className="w-16 p-1 rounded border-2 border-slate-200 text-center font-black text-xs" />
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase">min</span>
                                                    </div>
                                                </div>
                                                <div className="flex flex-col items-end">
                                                    {i === 0 ? (
                                                        <input type="time" value={w.startTime} onChange={(e) => { const newWaves = [...waves]; newWaves[0].startTime = e.target.value; setWaves(newWaves); }} className="p-2 rounded-lg border-2 border-ml-blue outline-none font-black text-sm" />
                                                    ) : (
                                                        <span className="text-xs font-black text-slate-400 bg-slate-200 px-3 py-2 rounded-lg border-2 border-transparent">{w.startTime}</span>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <h3 className="font-black text-slate-400 uppercase text-xs tracking-widest border-b pb-2">Automatização, Voz e Alertas</h3>
                                    <div className="p-6 bg-slate-50 rounded-xl border border-slate-200 space-y-6">
                                        <div className="space-y-2">
                                            <label className="block text-[10px] font-black uppercase text-slate-500">Seletor de Voz:</label>
                                            <select value={selectedVoiceName} onChange={(e) => setSelectedVoiceName(e.target.value)} className="w-full p-3 rounded-lg border-2 border-slate-200 focus:border-ml-blue outline-none font-bold text-xs bg-white">
                                                {voices.length === 0 && <option>A carregar vozes...</option>}
                                                {voices.map((voice) => (
                                                    <option key={voice.name} value={voice.name}>{voice.name} ({voice.lang})</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div className="flex items-center justify-between p-4 bg-white rounded-xl border-2 border-ml-blue/10">
                                            <div className="flex flex-col"><span className="font-black text-slate-700 text-sm uppercase italic">Execução Automática</span></div>
                                            <button onClick={() => setIsAutoStartEnabled(!isAutoStartEnabled)} className={`w-14 h-7 rounded-full transition-all relative shadow-inner ${isAutoStartEnabled ? 'bg-ml-blue' : 'bg-slate-300'}`}><div className={`absolute top-1 w-5 h-5 rounded-full bg-white transition-all shadow-md ${isAutoStartEnabled ? 'right-1' : 'left-1'}`}></div></button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="block text-[9px] font-black uppercase text-slate-500 mb-1">Alerta Final (Min):</label><input type="number" value={alarmTriggerMinutes} onChange={(e) => setAlarmTriggerMinutes(Number(e.target.value))} className="w-full p-2 rounded-lg border-2 border-slate-200 font-bold text-sm" /></div>
                                            <div><label className="block text-[9px] font-black uppercase text-slate-500 mb-1">Repetir Alerta (Seg):</label><input type="number" value={alarmRepeatSeconds} onChange={(e) => setAlarmRepeatSeconds(Number(e.target.value))} className="w-full p-2 rounded-lg border-2 border-slate-200 font-bold text-sm" /></div>
                                        </div>
                                    </div>
                                    <button onClick={() => setView('timer')} className="w-full bg-ml-blue text-white p-5 rounded-xl font-black uppercase shadow-lg text-xl">Confirmar Ajustes</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <footer className="mt-8 text-center text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] pb-4">Sistema de Gestão Logística SSC7 • Mercado Livre Style</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
