<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC7 Wave Manager - Service Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        // Configuração do Tailwind para reconhecer as cores do Mercado Livre
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'ml-blue': '#3483FA',
                'ml-yellow': '#FFE600',
                'ml-yellow-dark': '#E2CC00',
              }
            }
          }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        :root {
            --ml-yellow: #FFE600;
            --ml-blue: #3483FA;
            --ml-gray: #EBEBEB;
            --ml-dark: #333333;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--ml-gray);
            color: var(--ml-dark);
            overflow-x: hidden;
        }

        .ml-shadow { box-shadow: 0 1px 2px 0 rgba(0,0,0,.1); }
        .font-mono-timer { font-family: 'JetBrains Mono', monospace; }

        @keyframes pulse-alert {
            0%, 100% { transform: scale(1); opacity: 1; color: #ef4444; }
            50% { transform: scale(1.03); opacity: 0.9; color: #b91c1c; }
        }
        .animate-alert { animation: pulse-alert 0.8s infinite; }

        .progress-transition { transition: width 1s linear; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        const Icons = {
            Play: () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            Pause: () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Reset: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
            Settings: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            Mute: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>,
            Unmute: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
            Horn: () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2V15H6L11 19V5Z"/><path d="M19.07 4.93C20.94 6.81 22 9.33 22 12C22 14.67 20.94 17.19 19.07 19.07"/></svg>,
            Package: () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M16.5 9.4 7.5 4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
            Mic: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>,
            Trash: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Plus: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Maximize: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>,
            Minimize: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>,
            Copy: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
        };

        const App = () => {
            const [view, setView] = useState('timer');
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [copySuccess, setCopySuccess] = useState(false);
            const [waves, setWaves] = useState(() => {
                const saved = localStorage.getItem('ssc7_waves_config_v11');
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: 'Onda 1', duration: 30 * 60, startTime: '12:30' },
                    { id: 2, name: 'Onda 2', duration: 20 * 60, startTime: '13:00' },
                    { id: 3, name: 'Onda 3', duration: 20 * 60, startTime: '13:20' },
                    { id: 4, name: 'Onda 4', duration: 20 * 60, startTime: '13:40' },
                    { id: 5, name: 'Onda 5', duration: 20 * 60, startTime: '14:00' },
                    { id: 6, name: 'Onda 6', duration: 20 * 60, startTime: '14:20' },
                    { id: 7, name: 'Onda 7', duration: 5 * 60, startTime: '14:40' },
                ];
            });

            const [activeIdx, setActiveIdx] = useState(0);
            const [timeLeft, setTimeLeft] = useState(waves[0].duration);
            const [isRunning, setIsRunning] = useState(false);
            const [customAnnouncement, setCustomAnnouncement] = useState("");
            
            const [isMuted, setIsMuted] = useState(() => JSON.parse(localStorage.getItem('ssc7_mute')) || false);
            const [autoStart, setAutoStart] = useState(() => {
                const s = localStorage.getItem('ssc7_autostart');
                return s !== null ? JSON.parse(s) : true;
            });
            const [autoNext, setAutoNext] = useState(() => {
                const s = localStorage.getItem('ssc7_autonext');
                return s !== null ? JSON.parse(s) : true;
            });
            const [triggerMin, setTriggerMin] = useState(() => Number(localStorage.getItem('ssc7_triggermin')) || 1);
            const [repeatSec, setRepeatSec] = useState(() => Number(localStorage.getItem('ssc7_repeatsec')) || 45);
            const [selectedVoiceName, setSelectedVoiceName] = useState(() => localStorage.getItem('ssc7_voice') || "");
            
            const [stationName, setStationName] = useState(() => localStorage.getItem('ssc7_station_name') || "SSC7");
            const [locationName, setLocationName] = useState(() => localStorage.getItem('ssc7_location_name') || "Lages, SC");

            const [systemTime, setSystemTime] = useState("");
            const [voices, setVoices] = useState([]);
            const timerRef = useRef(null);

            const handleAddWave = () => {
                const newWaves = [...waves];
                const nextId = newWaves.length > 0 ? Math.max(...newWaves.map(w => w.id)) + 1 : 1;
                newWaves.push({
                    id: nextId,
                    name: `Onda ${nextId}`,
                    duration: 20 * 60,
                    startTime: '00:00'
                });
                setWaves(newWaves);
            };

            const handleDeleteWave = (indexToRemove) => {
                if (waves.length <= 1) return; // Impede exclusão se houver apenas 1 onda
                const newWaves = waves.filter((_, index) => index !== indexToRemove);
                setWaves(newWaves);
                
                // Reajusta a onda ativa se a excluída afetar o índice atual
                if (activeIdx >= newWaves.length) {
                    const newIdx = newWaves.length - 1;
                    setActiveIdx(newIdx);
                    setTimeLeft(newWaves[newIdx].duration);
                } else if (activeIdx === indexToRemove) {
                    setTimeLeft(newWaves[activeIdx].duration);
                }
            };

            const formatTime = (s) => {
                const m = Math.floor(s / 60);
                const rs = s % 60;
                return `${m.toString().padStart(2, '0')}:${rs.toString().padStart(2, '0')}`;
            };

            const calculateStartTime = (baseTime, minutesToAdd) => {
                const [h, m] = baseTime.split(':').map(Number);
                const d = new Date();
                d.setHours(h, m + minutesToAdd, 0);
                return d.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
            };

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                    setIsFullscreen(true);
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                        setIsFullscreen(false);
                    }
                }
            };

            const copySchedule = () => {
                let text = `📦 *PLANEAMENTO DE ONDAS - ${stationName}*\n\n`;
                waves.forEach(w => {
                    const end = calculateStartTime(w.startTime, w.duration / 60);
                    text += `🔹 *${w.name}*: ${w.startTime} às ${end} (${Math.floor(w.duration/60)} min)\n`;
                });
                text += `\nTotal: ${waves.length} Ondas. Boa operação a todos! 🚀`;
                
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand("copy");
                    textArea.remove();
                }
                
                setCopySuccess(true);
                setTimeout(() => setCopySuccess(false), 3000);
            };

            useEffect(() => {
                localStorage.setItem('ssc7_waves_config_v11', JSON.stringify(waves));
                localStorage.setItem('ssc7_mute', isMuted);
                localStorage.setItem('ssc7_autostart', autoStart);
                localStorage.setItem('ssc7_autonext', autoNext);
                localStorage.setItem('ssc7_triggermin', triggerMin);
                localStorage.setItem('ssc7_repeatsec', repeatSec);
                localStorage.setItem('ssc7_voice', selectedVoiceName);
                localStorage.setItem('ssc7_station_name', stationName);
                localStorage.setItem('ssc7_location_name', locationName);
            }, [waves, isMuted, autoStart, autoNext, triggerMin, repeatSec, selectedVoiceName, stationName, locationName]);

            useEffect(() => {
                const updated = [...waves];
                let changed = false;
                let currentTotalMinutes = 0;
                for (let i = 1; i < updated.length; i++) {
                    currentTotalMinutes += updated[i-1].duration / 60;
                    const expectedStart = calculateStartTime(updated[0].startTime, currentTotalMinutes);
                    if (updated[i].startTime !== expectedStart) {
                        updated[i].startTime = expectedStart;
                        changed = true;
                    }
                }
                if (changed) setWaves(updated);
            }, [waves[0].startTime, waves.map(w => w.duration).join(',')]);

            useEffect(() => {
                const load = () => {
                    const av = window.speechSynthesis.getVoices();
                    setVoices(av);
                    if (!selectedVoiceName && av.length > 0) {
                        const pref = av.find(v => v.lang.includes('pt-BR') || v.lang.includes('pt-PT')) || av[0];
                        setSelectedVoiceName(pref.name);
                    }
                };
                load();
                window.speechSynthesis.onvoiceschanged = load;
            }, []);

            const playHorn = useCallback(() => {
                if (isMuted) return;
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const playTone = (freq, start, dur) => {
                    const osc = ctx.createOscillator();
                    const g = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
                    g.gain.setValueAtTime(0, ctx.currentTime + start);
                    g.gain.linearRampToValueAtTime(0.2, ctx.currentTime + start + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + start + dur);
                    osc.connect(g); g.connect(ctx.destination);
                    osc.start(ctx.currentTime + start);
                    osc.stop(ctx.currentTime + start + dur);
                };
                playTone(587.33, 0, 0.8);
                playTone(440.00, 0.6, 0.8);
                setTimeout(() => ctx.close(), 2500);
            }, [isMuted]);

            const speak = useCallback((text) => {
                if (isMuted || !text) return;
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                const v = voices.find(v => v.name === selectedVoiceName);
                if (v) u.voice = v;
                u.rate = 1.1;
                window.speechSynthesis.speak(u);
            }, [isMuted, voices, selectedVoiceName]);

            useEffect(() => {
                if (isRunning && timeLeft > 0) {
                    timerRef.current = setInterval(() => setTimeLeft(p => p - 1), 1000);
                } else if (timeLeft === 0 && isRunning) {
                    clearInterval(timerRef.current);
                    playHorn();
                    speak(`${waves[activeIdx].name} finalizada.`);
                    if (autoNext && activeIdx < waves.length - 1) {
                        setTimeout(() => {
                            const next = activeIdx + 1;
                            setActiveIdx(next);
                            setTimeLeft(waves[next].duration);
                            playHorn();
                            setTimeout(() => speak(`Iniciando a ${waves[next].name}.`), 1500);
                        }, 5000);
                    } else {
                        setIsRunning(false);
                    }
                }
                return () => clearInterval(timerRef.current);
            }, [isRunning, timeLeft, activeIdx, autoNext, waves]);

            useEffect(() => {
                if (!isRunning) return;
                const half = Math.floor(waves[activeIdx].duration / 2);
                if (timeLeft === half) {
                    playHorn();
                    setTimeout(() => speak(`${waves[activeIdx].name}: Metade do tempo concluída. Restam ${Math.floor(timeLeft/60)} minutos.`), 1500);
                }
                const triggerSecs = triggerMin * 60;
                if (timeLeft <= triggerSecs && timeLeft > 0 && timeLeft % repeatSec === 0 && timeLeft !== half) {
                    playHorn();
                    setTimeout(() => speak(`Atenção equipe, restam ${Math.floor(timeLeft/60)} minutos para o fim da onda.`), 1500);
                }
            }, [timeLeft, isRunning]);

            useEffect(() => {
                const tick = setInterval(() => {
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
                    setSystemTime(timeStr);
                    if (autoStart && !isRunning && activeIdx === 0 && timeLeft === waves[0].duration) {
                        if (timeStr === waves[0].startTime) toggleTimer(true);
                    }
                }, 1000);
                return () => clearInterval(tick);
            }, [autoStart, isRunning, activeIdx, timeLeft, waves]);

            const toggleTimer = (forceStart = false) => {
                const start = forceStart || !isRunning;
                if (start && timeLeft === waves[activeIdx].duration) {
                    playHorn();
                    setTimeout(() => speak(`Atenção time, vai começar a Expedição. Iniciando a ${waves[activeIdx].name}. Boa operação a todos.`), 1500);
                }
                setIsRunning(start);
            };

            const manualAlert = () => {
                playHorn();
                const m = Math.floor(timeLeft / 60);
                setTimeout(() => speak(`Atenção time, para a ${waves[activeIdx].name} restam ${m} minutos.`), 1500);
            };

            const handleCustomAnnouncement = () => {
                if (customAnnouncement.trim()) {
                    speak(customAnnouncement);
                }
            };

            const totalDailySeconds = useMemo(() => waves.reduce((acc, curr) => acc + curr.duration, 0), [waves]);
            const completedSeconds = useMemo(() => {
                let completed = 0;
                for(let i = 0; i < activeIdx; i++) completed += waves[i].duration;
                completed += (waves[activeIdx].duration - timeLeft);
                return completed;
            }, [activeIdx, timeLeft, waves]);

            return (
                <div className="max-w-[98%] mx-auto p-4 md:p-6 min-h-screen flex flex-col">
                    <header className="bg-ml-yellow rounded-2xl p-4 md:p-8 mb-6 flex justify-between items-center ml-shadow border-b-4 border-ml-yellow-dark">
                        <div className="flex-1 flex items-center gap-6">
                            <div className="bg-white p-4 rounded-2xl text-ml-blue shadow-sm"><Icons.Package /></div>
                            <div>
                                <h1 className="text-2xl md:text-3xl font-black italic tracking-tighter uppercase leading-none">Gestor de Ondas • {stationName}</h1>
                                <p className="text-[12px] font-black text-[#333333] uppercase tracking-[0.2em] mt-1.5 opacity-80">{locationName} • Service Center</p>
                            </div>
                        </div>

                        <div className="flex justify-center flex-1">
                            <img 
                                src="https://logodownload.org/wp-content/uploads/2016/08/mercado-livre-logo-8.png" 
                                alt="Mercado Livre" 
                                className="h-12 md:h-20 w-auto object-contain"
                                onError={(e) => {e.target.style.display='none'}}
                            />
                        </div>

                        <div className="flex-1 flex justify-end items-center gap-4 md:gap-10">
                            <div className="flex items-center gap-6 bg-white/80 px-8 py-4 rounded-3xl ml-shadow border-2 border-white/60">
                                <span className="w-4 h-4 rounded-full bg-green-600 animate-pulse"></span>
                                <span className="text-6xl md:text-9xl font-black text-slate-900 tracking-tighter font-mono-timer leading-none tabular-nums">{systemTime}</span>
                            </div>
                            
                            <div className="flex flex-col gap-3">
                                <button onClick={toggleFullscreen} className="p-4 rounded-2xl transition-all bg-white/60 text-slate-800 hover:bg-white shadow-sm border border-white/40" title="Ecrã Inteiro">
                                    {isFullscreen ? <Icons.Minimize /> : <Icons.Maximize />}
                                </button>
                                <button onClick={() => setIsMuted(!isMuted)} className={`p-4 rounded-2xl transition-all ${isMuted ? 'bg-red-500 text-white shadow-inner' : 'bg-white/60 text-slate-800 hover:bg-white shadow-sm border border-white/40'}`}>
                                    {isMuted ? <Icons.Mute /> : <Icons.Unmute />}
                                </button>
                                <button onClick={() => setView(view === 'timer' ? 'setup' : 'timer')} className="bg-white/60 hover:bg-white p-4 rounded-2xl transition-all text-slate-800 ml-shadow border border-white/40">
                                    <Icons.Settings />
                                </button>
                            </div>
                        </div>
                    </header>

                    {view === 'timer' ? (
                        <main className="flex-1 flex flex-col gap-6 animate-in fade-in duration-500">
                            <div className="bg-white rounded-xl p-3 ml-shadow border border-slate-200">
                                <div className="flex justify-between text-[10px] font-black uppercase text-slate-400 mb-1.5 px-1">
                                    <span>Progresso Diário</span>
                                    <span>{Math.round((completedSeconds / totalDailySeconds) * 100)}%</span>
                                </div>
                                <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                                    <div className="h-full bg-green-500 progress-transition" style={{ width: `${(completedSeconds / totalDailySeconds) * 100}%` }}></div>
                                </div>
                            </div>

                            <div className="bg-white rounded-3xl p-8 md:p-14 text-center border border-slate-200 ml-shadow relative overflow-hidden flex-1 flex flex-col justify-center">
                                <div className="mb-6 flex flex-col items-center gap-3">
                                    <div className="flex flex-col items-center">
                                        <span className={`px-10 py-4 rounded-3xl text-4xl md:text-6xl font-black uppercase tracking-tight border-4 transition-all shadow-xl ${timeLeft < 60 ? 'bg-red-600 text-white border-red-700' : 'bg-[#333333] text-white border-slate-700'}`}>
                                            {waves[activeIdx].name}
                                        </span>
                                        <span className="mt-4 px-5 py-1.5 rounded-full text-[13px] font-black uppercase tracking-[0.2em] bg-slate-100 text-slate-500 border border-slate-200 shadow-sm">
                                            {isRunning ? 'Operação em Curso' : 'Operação Pausada'}
                                        </span>
                                    </div>
                                    {autoStart && activeIdx === 0 && !isRunning && timeLeft === waves[0].duration && (
                                        <div className="text-[11px] font-black text-ml-blue animate-pulse uppercase tracking-tight mt-2">Próximo início: {waves[0].startTime}</div>
                                    )}
                                </div>

                                <div className={`font-mono-timer text-8xl md:text-[13rem] font-bold tabular-nums tracking-tighter leading-none transition-all duration-300 ${timeLeft < 60 ? 'animate-alert' : 'text-slate-900'}`}>
                                    {formatTime(timeLeft)}
                                </div>

                                <div className="max-w-md mx-auto w-full h-3 bg-slate-100 rounded-full my-10 overflow-hidden border border-slate-200 shadow-inner">
                                    <div className={`h-full rounded-full progress-transition ${timeLeft < 60 ? 'bg-red-500' : 'bg-ml-blue'}`} style={{ width: `${(1 - timeLeft / waves[activeIdx].duration) * 100}%` }}></div>
                                </div>

                                <div className="flex flex-wrap justify-center items-center gap-4 z-10 mb-8">
                                    <button onClick={() => { setIsRunning(false); setTimeLeft(waves[activeIdx].duration); }} className="p-5 rounded-2xl bg-slate-50 hover:bg-slate-100 border-2 border-slate-100 text-slate-400 active:scale-95 transition-all" title="Reiniciar"><Icons.Reset /></button>
                                    <button onClick={manualAlert} className="p-5 rounded-2xl bg-blue-50 text-ml-blue hover:bg-blue-100 border-2 border-blue-100 active:scale-95 transition-all flex items-center gap-2"><Icons.Horn /><span className="hidden md:inline font-black text-xs uppercase tracking-widest">Alerta Manual</span></button>
                                    <button onClick={() => toggleTimer()} className={`px-14 py-5 rounded-2xl font-black text-2xl flex items-center gap-4 shadow-xl transition-all transform active:scale-95 ${isRunning ? 'bg-slate-800 text-white' : 'bg-ml-yellow text-slate-900'}`}>{isRunning ? <><Icons.Pause /> Pausar</> : <><Icons.Play /> Iniciar</>}</button>
                                    {timeLeft === 0 && activeIdx < waves.length - 1 && (
                                        <button onClick={() => { const n = activeIdx + 1; setActiveIdx(n); setTimeLeft(waves[n].duration); toggleTimer(true); }} className="px-8 py-5 rounded-2xl bg-green-500 text-white font-black text-lg hover:brightness-110 shadow-lg animate-bounce transition-all">Próxima Onda</button>
                                    )}
                                </div>

                                <div className="max-w-2xl mx-auto w-full bg-slate-50 p-4 rounded-2xl border-2 border-slate-100 flex gap-3 items-center ml-shadow">
                                    <div className="text-ml-blue"><Icons.Mic /></div>
                                    <input 
                                        type="text" 
                                        placeholder="Escreva um comunicado para a voz falar..." 
                                        className="flex-1 bg-transparent border-none outline-none font-bold text-slate-600 placeholder:text-slate-300 px-2"
                                        value={customAnnouncement}
                                        onChange={(e) => setCustomAnnouncement(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleCustomAnnouncement()}
                                    />
                                    <button 
                                        onClick={handleCustomAnnouncement}
                                        disabled={!customAnnouncement.trim()}
                                        className={`px-6 py-2.5 rounded-xl font-black uppercase text-xs transition-all ${customAnnouncement.trim() ? 'bg-ml-blue text-white shadow-md active:scale-95' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                                    >
                                        Falar Agora
                                    </button>
                                </div>

                                <div className="absolute -bottom-16 -right-16 opacity-[0.03] rotate-12 pointer-events-none"><Icons.Package size={400} /></div>
                            </div>

                            <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-3 pb-6">
                                {waves.map((w, i) => (
                                    <button key={w.id} disabled={isRunning} onClick={() => { setActiveIdx(i); setTimeLeft(w.duration); }} className={`p-4 rounded-2xl border-2 text-left transition-all ${i === activeIdx ? 'border-ml-blue bg-white shadow-lg ring-4 ring-blue-50 scale-105 z-10' : i < activeIdx ? 'border-transparent bg-slate-200 opacity-40 grayscale' : 'border-transparent bg-white/70 hover:bg-white hover:shadow-md'} ${isRunning ? 'cursor-not-allowed' : 'cursor-pointer'}`}>
                                        <p className="text-[9px] font-black uppercase text-slate-400 mb-1">{w.startTime}</p>
                                        <p className="font-bold text-slate-800 text-sm truncate">{w.name}</p>
                                        <p className={`text-[10px] font-black uppercase tracking-tighter ${i === activeIdx ? 'text-ml-blue' : 'text-slate-400'}`}>{Math.floor(w.duration / 60)} MIN</p>
                                    </button>
                                ))}
                            </div>
                        </main>
                    ) : (
                        <div className="bg-white p-6 md:p-10 rounded-3xl border border-slate-200 ml-shadow animate-in slide-in-from-bottom-4 duration-500">
                            <div className="flex items-center justify-between mb-10"><h2 className="text-2xl font-black uppercase tracking-tighter">Ajustes Operacionais</h2><button onClick={() => setView('timer')} className="bg-slate-100 hover:bg-slate-200 px-6 py-2 rounded-xl text-slate-600 font-black uppercase text-xs transition-all">Sair</button></div>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                <div className="space-y-6">
                                    <div className="flex items-center gap-2 border-b pb-4"><div className="w-2 h-6 bg-ml-blue rounded-full"></div><h3 className="font-black text-slate-800 uppercase text-xs tracking-widest">Cronograma de Ondas</h3></div>
                                    
                                    <button onClick={copySchedule} className={`w-full py-3 rounded-2xl font-black uppercase text-xs transition-all flex items-center justify-center gap-2 border-2 ${copySuccess ? 'bg-green-100 border-green-500 text-green-700' : 'bg-white border-slate-200 text-slate-600 hover:border-ml-blue hover:text-ml-blue shadow-sm'}`}>
                                        <Icons.Copy /> {copySuccess ? 'Copiado para a Área de Transferência!' : 'Copiar Planeamento Diário'}
                                    </button>

                                    <div className="space-y-3 max-h-[50vh] overflow-y-auto pr-2">
                                        {waves.map((w, i) => (
                                            <div key={w.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:border-slate-300 transition-all">
                                                <div className="flex flex-col gap-2">
                                                    <input 
                                                        type="text" 
                                                        value={w.name} 
                                                        onChange={(e) => { const n = [...waves]; n[i].name = e.target.value; setWaves(n); }} 
                                                        className="font-bold text-slate-700 text-sm bg-transparent border-b border-transparent hover:border-slate-300 focus:border-ml-blue outline-none transition-all w-32" 
                                                    />
                                                    <div className="flex items-center gap-2">
                                                        <input type="number" value={w.duration/60} onChange={(e) => { const n = [...waves]; const v = Math.max(1, Number(e.target.value)); n[i].duration = v * 60; setWaves(n); if (i === activeIdx) setTimeLeft(v * 60); }} className="w-16 p-2 rounded-lg border-2 border-slate-200 focus:border-ml-blue outline-none font-black text-xs text-center" />
                                                        <span className="text-[9px] font-black text-slate-400 uppercase">Minutos</span>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <div className="flex flex-col items-end">
                                                        {i === 0 ? <input type="time" value={w.startTime} onChange={(e) => { const n = [...waves]; n[0].startTime = e.target.value; setWaves(n); }} className="p-2.5 rounded-xl border-2 border-ml-blue outline-none font-black text-sm bg-white shadow-sm" /> : <div className="px-4 py-2 bg-slate-200 rounded-xl text-xs font-black text-slate-500 border border-slate-300">{w.startTime}</div>}
                                                        <span className="text-[9px] font-bold text-slate-400 mt-1 uppercase">Início Previsto</span>
                                                    </div>
                                                    {waves.length > 1 && (
                                                        <button onClick={() => handleDeleteWave(i)} className="p-2.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all" title="Excluir Onda">
                                                            <Icons.Trash />
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={handleAddWave} className="w-full mt-2 py-4 border-2 border-dashed border-ml-blue text-ml-blue rounded-2xl font-black uppercase text-xs hover:bg-blue-50 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                                            <Icons.Plus /> Adicionar Nova Onda
                                        </button>
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <div className="space-y-6 mb-6">
                                        <div className="flex items-center gap-2 border-b pb-4"><div className="w-2 h-6 bg-slate-800 rounded-full"></div><h3 className="font-black text-slate-800 uppercase text-xs tracking-widest">Dados da Estação</h3></div>
                                        <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 space-y-4">
                                            <div className="space-y-2">
                                                <label className="text-[9px] font-black uppercase text-slate-500">Nome da Estação (Ex: SSC7)</label>
                                                <input type="text" value={stationName} onChange={(e) => setStationName(e.target.value)} className="w-full p-3 rounded-xl border-2 border-slate-200 font-bold outline-none focus:border-ml-blue transition-all" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[9px] font-black uppercase text-slate-500">Localização (Ex: Lages, SC)</label>
                                                <input type="text" value={locationName} onChange={(e) => setLocationName(e.target.value)} className="w-full p-3 rounded-xl border-2 border-slate-200 font-bold outline-none focus:border-ml-blue transition-all" />
                                            </div>
                                        </div>
                                    </div>
                                
                                    <div className="flex items-center gap-2 border-b pb-4"><div className="w-2 h-6 bg-ml-yellow rounded-full"></div><h3 className="font-black text-slate-800 uppercase text-xs tracking-widest">Automação e Avisos</h3></div>
                                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 space-y-8">
                                        <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 px-1">Voz do Sistema</label><select value={selectedVoiceName} onChange={(e) => setSelectedVoiceName(e.target.value)} className="w-full p-4 rounded-xl border-2 border-slate-200 focus:border-ml-blue outline-none font-bold text-sm bg-white shadow-sm transition-all">{voices.map(v => <option key={v.name} value={v.name}>{v.name} ({v.lang})</option>)}</select></div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <button onClick={() => setAutoStart(!autoStart)} className={`flex items-center justify-between p-4 rounded-2xl border-2 transition-all ${autoStart ? 'bg-white border-ml-blue' : 'bg-white border-slate-200 opacity-60'}`}><div className="text-left"><p className="font-black text-xs uppercase italic leading-none">Início Auto</p><p className="text-[9px] text-slate-400 mt-1">Ao bater {waves[0].startTime}</p></div><div className={`w-10 h-5 rounded-full relative transition-all ${autoStart ? 'bg-ml-blue' : 'bg-slate-300'}`}><div className={`absolute top-1 w-3 h-3 bg-white rounded-full transition-all ${autoStart ? 'right-1' : 'left-1'}`}></div></div></button>
                                            <button onClick={() => setAutoNext(!autoNext)} className={`flex items-center justify-between p-4 rounded-2xl border-2 transition-all ${autoNext ? 'bg-white border-green-500' : 'bg-white border-slate-200 opacity-60'}`}><div className="text-left"><p className="font-black text-xs uppercase italic leading-none">Próxima Auto</p><p className="text-[9px] text-slate-400 mt-1">Transição fluida</p></div><div className={`w-10 h-5 rounded-full relative transition-all ${autoNext ? 'bg-green-500' : 'bg-slate-300'}`}><div className={`absolute top-1 w-3 h-3 bg-white rounded-full transition-all ${autoNext ? 'right-1' : 'left-1'}`}></div></div></button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 pt-4">
                                            <div className="space-y-2"><label className="text-[9px] font-black uppercase text-slate-500">Aviso Final (Min)</label><input type="number" value={triggerMin} onChange={(e) => setTriggerMin(Number(e.target.value))} className="w-full p-3 rounded-xl border-2 border-slate-200 font-bold" /></div>
                                            <div className="space-y-2"><label className="text-[9px] font-black uppercase text-slate-500">Repetição (Seg)</label><input type="number" value={repeatSec} onChange={(e) => setRepeatSec(Number(e.target.value))} className="w-full p-3 rounded-xl border-2 border-slate-200 font-bold" /></div>
                                        </div>
                                    </div>
                                    <button onClick={() => setView('timer')} className="w-full bg-ml-blue text-white py-5 rounded-2xl font-black uppercase shadow-xl hover:brightness-110 active:scale-[0.98] transition-all text-lg">Confirmar Alterações</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <footer className="mt-8 text-center pb-8"><p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] opacity-60">Sistema de Gestão {stationName} • Service Center {locationName.split(',')[0]} • Criado por Lemuel Bueno </p></footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
